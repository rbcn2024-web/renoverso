<!DOCTYPE html>
<html>
  <head>
    <title>Nexo Cuántico - Metaverso Rafael</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.controls.min.js"></script>
    
    <script>
      // SCRIPT DE PINTURA (Bolitas brillantes)
      AFRAME.registerComponent('pincel-pixel', {
        init: function () {
          this.pintando = false;
          this.el.addEventListener('triggerdown', () => { this.pintando = true; });
          this.el.addEventListener('triggerup', () => { this.pintando = false; });
        },
        tick: function () {
          if (!this.pintando) return;
          var position = new THREE.Vector3();
          this.el.object3D.getWorldPosition(position);
          var pixel = document.createElement('a-sphere');
          pixel.setAttribute('radius', '0.04');
          pixel.setAttribute('position', position);
          var colores = ["#00FFFF", "#FF1493", "#FFD700", "#ADFF2F"];
          var color = colores[Math.floor(Math.random() * colores.length)];
          pixel.setAttribute('color', color);
          pixel.setAttribute('material', 'emissive', color);
          pixel.setAttribute('material', 'emissiveIntensity', 2);
          this.el.sceneEl.appendChild(pixel);
        }
      });

      // SCRIPT PARA VIAJAR
      AFRAME.registerComponent('portal-link', {
        schema: { url: {type: 'string'} },
        init: function () {
          this.el.addEventListener('click', () => {
            window.location.href = this.data.url;
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene renderer="colorManagement: true;">
      
      <a-assets>
        <a-asset-item id="glb1" src="../glb1.glb"></a-asset-item>
        <a-asset-item id="glb2" src="../glb2.glb"></a-asset-item>
      </a-assets>

      <a-sky color="#050812"></a-sky>
      <a-grid position="0 0 0" rotation="-90 0 0" width="100" height="100"></a-grid>

      <a-entity id="rig" movement-controls="fly: false; speed: 0.2">
        <a-entity camera position="0 1.6 0" look-controls></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .clickable" pincel-pixel></a-entity>
      </a-entity>
      
      <a-entity light="type: ambient; intensity: 0.3"></a-entity>

      <a-entity position="-8 0 -5" class="clickable" portal-link="url: ../index.html">
        <a-cylinder radius="1" height="3" color="#00FFFF" opacity="0.5"></a-cylinder>
        <a-text value="VOLVER A PIRAMIDES" align="center" position="0 2 0" width="6"></a-text>
      </a-entity>

      <a-entity position="0 20 -40">
        <a-torus-knot radius="20" radius-tubular="0.5" p="2" q="9" 
          material="wireframe: true; color: #ADFF2F; emissive: #ADFF2F; emissiveIntensity: 2"
          animation="property: rotation; to: 360 360 0; loop: true; dur: 40000; easing: linear">
        </a-torus-knot>
      </a-entity>

      <a-text value="USA EL GATILLO PARA PINTAR" position="0 3 -4" align="center" color="#FFF"></a-text>

    </a-scene>
  </body>
</html>
