
  <!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Motor Metaverso: Portales Intuitivos</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <script>
      let energiaTotal = 0;
      let despegueIniciado = false;
      let audioCtx = null;

      function playDespegueSound() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = audioCtx.createOscillator();
        let noise = audioCtx.createOscillator(); 
        let gain = audioCtx.createGain();
        osc.type = 'sawtooth'; noise.type = 'square';
        osc.connect(gain); noise.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(40, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 15);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 15);
        osc.start(); noise.start();
        osc.stop(audioCtx.currentTime + 16); noise.stop(audioCtx.currentTime + 16);
      }

      AFRAME.registerComponent('moneda', {
        schema: { valor: {type: 'int'} },
        init: function () {
          this.el.classList.add('clickable');
          this.el.addEventListener('click', () => {
            energiaTotal += this.data.valor;
            document.querySelector('#marcador-mano').setAttribute('value', 'E: ' + energiaTotal);
            if (energiaTotal >= 5000 && !despegueIniciado) {
                const p = document.querySelector('#nave-monumental');
                p.setAttribute('animation', 'property: position; to: 0 400 -60; dur: 30000; easing: easeInQuad');
                playDespegueSound();
                document.querySelector('#humo-particulas').setAttribute('visible', 'true');
                despegueIniciado = true;
            }
            this.el.parentNode.removeChild(this.el);
          });
        }
      });

      AFRAME.registerComponent('portal-link', {
        schema: { url: {type: 'string'} },
        init: function () {
          this.el.classList.add('clickable');
          this.el.addEventListener('click', () => {
            window.location.href = this.data.url;
          });
        }
      });

      AFRAME.registerComponent('generar-tesoros', {
        init: function () {
          const scene = this.el;
          for(let i=0; i<100; i++){
            let m = document.createElement('a-cylinder');
            let angle = Math.random() * Math.PI * 2;
            let radius = 35 + Math.random() * 130;
            let x = Math.cos(angle) * radius;
            let z = Math.sin(angle) * radius;
            m.setAttribute('position', `${x} 0.1 ${z}`); 
            m.setAttribute('radius', '0.2'); m.setAttribute('height', '0.02'); 
            m.setAttribute('color', '#FFD700'); m.setAttribute('rotation', '90 0 0');
            m.setAttribute('moneda', {valor: 100});
            m.setAttribute('material', 'metalness: 0.8; roughness: 0.2');
            scene.appendChild(m);
          }
        }
      });
    </script>

    <a-scene generar-tesoros renderer="colorManagement: true">
      <a-assets>
        <a-asset-item id="glb1" src="glb1.glb"></a-asset-item>
        <a-asset-item id="glb2" src="glb2.glb"></a-asset-item>
        <a-asset-item id="glb3" src="glb3.glb"></a-asset-item>
        <a-asset-item id="glb4" src="glb4.glb"></a-asset-item>
      </a-assets>

      <a-sky color="#82CAFF"></a-sky>
      <a-light type="ambient" intensity="0.8"></a-light>
      <a-plane rotation="-90 0 0" width="2000" height="2000" color="#D2B48C"></a-plane>

      <a-entity id="rig" movement-controls="speed: 0.6">
        <a-entity camera look-controls position="0 1.6 0"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 60"></a-entity>
        <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 60">
          <a-text id="marcador-mano" value="E: 0" position="0 0.15 0" rotation="-45 0 0" align="center" width="2" color="#00FF00"></a-text>
        </a-entity>
      </a-entity>

      <a-entity id="nave-monumental" 
                geometry="primitive: cone; segmentsRadial: 4; radiusTop: 0.1; radiusBottom: 36; height: 54" 
                position="0 27 -60" 
                material="color: #E2C48E; flatShading: true">
          <a-entity id="humo-particulas" visible="false" position="0 -27 0">
              <a-sphere radius="4" color="#FFFFFF" opacity="0.4" animation="property: scale; to: 12 12 12; dur: 1000; loop: true"></a-sphere>
          </a-entity>
      </a-entity>

      <a-entity position="0 0.1 -60">
        <a-entity position="-5 1 0">
            <a-torus radius="2.5" radius-tubular="0.08" color="#FF3333"></a-torus>
            <a-circle radius="2.5" material="opacity: 0.1; transparent: true; color: #FF3333" 
                      class="clickable" portal-link="url: index.html"></a-circle>
            <a-text value="VOLVER AL HUB" position="0 3 0" align="center" width="6"></a-text>
        </a-entity>

        <a-entity position="5 1 0">
            <a-torus radius="2.5" radius-tubular="0.08" color="#33FF33"></a-torus>
            <a-circle radius="2.5" material="opacity: 0.1; transparent: true; color: #33FF33" 
                      class="clickable" portal-link="url: mundo2.html"></a-circle>
            <a-text value="SIGUIENTE MUNDO" position="0 3 0" align="center" width="6"></a-text>
        </a-entity>
      </a-entity>

      <a-entity gltf-model="#glb1" position="50 0 -60" scale="5 5 5"></a-entity>
      <a-entity gltf-model="#glb2" position="-50 0 -60" scale="5 5 5"></a-entity>
      <a-entity gltf-model="#glb3" position="0 0 -110" scale="5 5 5"></a-entity>
      <a-entity gltf-model="#glb4" position="0 0 -10" scale="5 5 5"></a-entity>

    </a-scene>
  </body>
</html>
