<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Metaverso Rafael - Mundo Gigante</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="glb1" src="glb1.glb"></a-asset-item>
        <a-asset-item id="glb2" src="glb2.glb"></a-asset-item>
        <a-asset-item id="glb3" src="glb3.glb"></a-asset-item>
        <a-asset-item id="glb4" src="glb4.glb"></a-asset-item>
      </a-assets>

      <a-sky color="#87CEEB"></a-sky>
      <a-plane position="0 0 0" rotation="-90 0 0" width="1000" height="1000" color="#C2B280"></a-plane>

      <a-cone color="#D2B48C" height="20" radius-bottom="20" position="0 10 0"></a-cone>

      <a-entity gltf-model="#glb1" position="0 15 -500" scale="500 500 500" animation-mixer></a-entity>
      
      <a-entity gltf-model="#glb2" position="0 15 500" scale="500 500 500" animation-mixer></a-entity>
      
      <a-entity gltf-model="#glb3" position="550 15 0" scale="500 500 500" rotation="0 -90 0" animation-mixer></a-entity>
      
      <a-entity gltf-model="#glb4" position="-550 15 0" scale="500 500 500" rotation="0 90 0" animation-mixer></a-entity>

      <a-torus color="#FFD700" arc="360" radius="2" radius-tubular="0.1" position="0 2 -10" 
               link="href: mundo2.html; title: Viaje Cuántico"
               animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
      </a-torus>

      <a-entity light="type: ambient; intensity: 0.7"></a-entity>
      <a-entity light="type: directional; intensity: 0.6; position: -1 2 1"></a-entity>
      <a-entity movement-controls="fly: true; speed: 0.5">
        <a-entity camera position="0 1.6 5" look-controls></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
