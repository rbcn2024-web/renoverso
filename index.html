<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Metaverso Rafael - Reconstrucción Total</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="glb1" src="glb1.glb"></a-asset-item>
        <a-asset-item id="glb2" src="glb2.glb"></a-asset-item>
        <a-asset-item id="glb3" src="glb3.glb"></a-asset-item>
        <a-asset-item id="glb4" src="glb4.glb"></a-asset-item>
      </a-assets>

      <a-sky color="#87CEEB"></a-sky>
      <a-plane position="0 -0.1 0" rotation="-90 0 0" width="5000" height="5000" color="#C2B280"></a-plane>

      <a-cone color="#D2B48C" height="20" radius-bottom="20" position="0 10 0"></a-cone>

      <a-torus color="#FFD700" radius="2" radius-tubular="0.1" position="0 2 -10"></a-torus>

      <a-entity position="0 0 -600">
          <a-entity gltf-model="#glb1" scale="400 400 400" animation-mixer></a-entity>
      </a-entity>
      
      <a-entity position="0 0 600">
          <a-entity gltf-model="#glb2" scale="400 400 400" animation-mixer></a-entity>
      </a-entity>
      
      <a-entity position="600 0 0">
          <a-entity gltf-model="#glb3" scale="400 400 400" rotation="0 -90 0" animation-mixer></a-entity>
      </a-entity>
      
      <a-entity position="-600 0 0">
          <a-entity gltf-model="#glb4" scale="400 400 400" rotation="0 90 0" animation-mixer></a-entity>
      </a-entity>

      <a-entity movement-controls="fly: true; speed: 1">
        <a-entity camera position="0 1.6 20" look-controls></a-entity>
      </a-entity>

      <a-light type="ambient" intensity="0.8"></a-light>
    </a-scene>
  </body>
</html>
