<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Metaverso Rafael - Imperio de Gigantes</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="glb1" src="glb1.glb"></a-asset-item>
        <a-asset-item id="glb2" src="glb2.glb"></a-asset-item>
        <a-asset-item id="glb3" src="glb3.glb"></a-asset-item>
        <a-asset-item id="glb4" src="glb4.glb"></a-asset-item>
      </a-assets>

      <a-sky color="#87CEEB"></a-sky>
      <a-plane position="0 0 0" rotation="-90 0 0" width="4000" height="4000" color="#C2B280"></a-plane>

      <a-cone color="#D2B48C" height="30" radius-bottom="30" position="0 15 0"></a-cone>

      <a-entity gltf-model="#glb1" position="0 50 -500" scale="800 800 800" animation-mixer></a-entity>
      
      <a-entity gltf-model="#glb2" position="0 50 500" scale="800 800 800" animation-mixer></a-entity>
      
      <a-entity gltf-model="#glb3" position="500 50 0" scale="800 800 800" rotation="0 -90 0" animation-mixer></a-entity>
      
      <a-entity gltf-model="#glb4" position="-500 50 0" scale="800 800 800" rotation="0 90 0" animation-mixer></a-entity>

      <a-torus color="#FFD700" arc="360" radius="3" radius-tubular="0.1" position="0 3 -15" 
               link="href: mundo2.html; title: Salto Cuántico"
               animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
      </a-torus>

      <a-entity light="type: ambient; intensity: 0.7"></a-entity>
      <a-entity light="type: directional; intensity: 0.8; position: -1 4 2"></a-entity>
      
      <a-entity movement-controls="fly: true; speed: 1.0">
        <a-entity camera position="0 1.6 10" look-controls></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
